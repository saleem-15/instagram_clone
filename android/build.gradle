allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Modern Gradle 8.x way to set the build directory
rootProject.layout.buildDirectory.set(rootProject.projectDir.parentFile.toPath().resolve("build").toFile())

subprojects {
    // Set subproject build directories inside the root build folder
    project.layout.buildDirectory.set(rootProject.layout.buildDirectory.get().asFile.toPath().resolve(project.name).toFile())
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}